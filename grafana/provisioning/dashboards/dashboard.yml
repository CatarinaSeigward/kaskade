# ============================================================
# Grafana Dashboard Provisioning
# Auto-loads dashboard JSON files from the provisioning directory.
# ============================================================

apiVersion: 1

providers:
  - name: 'Kaskade'
    orgId: 1
    folder: 'Kaskade'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
